[build]
  command = "pnpm build"
  publish = "dist"

# SPA redirect — all routes serve index.html (must be 200, not 301)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

[dev]
  command = "pnpm dev"
  port    = 5173
